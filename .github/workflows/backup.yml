name: Backup e Snapshot CDN

on:
  schedule:
    - cron: '0 * * * *'   # todo hora — mantém data.json atualizado
  workflow_dispatch:        # disparo manual pelo GitHub

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Exportar backlogs do Supabase
        run: |
          curl -s \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/backlogs?select=*&order=position" \
            -o /tmp/backlogs.json

      - name: Exportar tasks do Supabase
        run: |
          curl -s \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/tasks?select=*&order=position" \
            -o /tmp/tasks.json

      - name: Gerar data.json (CDN snapshot) e backup datado
        run: |
          mkdir -p backups
          DATE=$(date -u +"%Y-%m-%d")
          node -e "
            const backlogs = require('/tmp/backlogs.json');
            const tasks    = require('/tmp/tasks.json');
            const merged   = backlogs.map(b => ({
              ...b,
              tasks: tasks.filter(t => t.backlog_id === b.id)
            }));
            // data.json para CDN (carregamento instantâneo)
            require('fs').writeFileSync('data.json', JSON.stringify(merged));
            // backup datado
            require('fs').writeFileSync(
              'backups/$DATE.json',
              JSON.stringify({ exported_at: new Date().toISOString(), backlogs: merged }, null, 2)
            );
            console.log('Snapshot CDN + backup gerados. Backlogs:', backlogs.length, '| Tasks:', tasks.length);
          "

      - name: Manter apenas os últimos 12 backups
        run: |
          cd backups
          ls -t *.json 2>/dev/null | tail -n +13 | xargs -r rm --

      - name: Commitar snapshot e backup
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "snapshot: atualiza data.json e backup CDN [skip ci]"
          file_pattern: "data.json backups/*.json"
          commit_author: "GitHub Actions <actions@github.com>"
